name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Backend
        run: |
          cd backend
          npm install

      - name: Start Backend (test)
        run: |
          cd backend
          node server.js &
          sleep 5

      - name: Success Message
        run: echo "CI Pipeline Success 🚀"
